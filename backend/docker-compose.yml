services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      - PORT=8000
    volumes:
      - .:/app
    command: >
      sh -c "exec uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --no-access-log --reload"
